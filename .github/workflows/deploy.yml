name: Deploy to Hostinger VPS

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deploy type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - app-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 92.112.189.35
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 65002
          command_timeout: 8m
          script_stop: true
          script: |
            set -e
            echo "=== EMERGE-CHAT DEPLOYMENT STARTING ==="
            
            # Detect pkg manager
            PKG="dnf"
            command -v dnf &>/dev/null || PKG="yum"
            command -v $PKG &>/dev/null || PKG="apt-get"
            
            # System update
            $PKG update -y
            $PKG install -y curl git wget epel-release 2>/dev/null || $PKG install -y curl git wget
            $PKG install -y nginx certbot python3-certbot-nginx fail2ban
            
            # Stop LiteSpeed
            systemctl stop lsws 2>/dev/null || true
            systemctl disable lsws 2>/dev/null || true
            
            # Node.js 20.x
            if ! node --version 2>/dev/null | grep -q "v20\|v22"; then
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - 2>/dev/null || \
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              $PKG install -y nodejs
            fi
            
            # Deploy app
            rm -rf /var/www/emerge-chat
            git clone https://github.com/dineshpandey3683/emerge-chat-10-5.git /var/www/emerge-chat
            cd /var/www/emerge-chat
            npm install --production
            
            # PM2
            npm install -g pm2
            pm2 delete emerge-chat 2>/dev/null || true
            pm2 start server.js --name "emerge-chat"
            pm2 save
            pm2 startup systemd -u root --hp /root 2>/dev/null || pm2 startup
            
            # Nginx
            cat > /etc/nginx/conf.d/emerge-chat.conf << 'NGINX'
            server {
                listen 80;
                server_name chat.dineshpandey.shop _;
                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 86400;
                }
            }
            NGINX
            rm -f /etc/nginx/conf.d/default.conf
            nginx -t && systemctl restart nginx && systemctl enable nginx
            
            # Firewall
            firewall-cmd --permanent --add-service=http 2>/dev/null || true
            firewall-cmd --permanent --add-service=https 2>/dev/null || true
            firewall-cmd --permanent --add-port=65002/tcp 2>/dev/null || true
            firewall-cmd --reload 2>/dev/null || true
            
            # SSL
            certbot --nginx -d chat.dineshpandey.shop --non-interactive --agree-tos --email admin@dineshpandey.shop --redirect || echo "SSL pending DNS"
            
            # Fail2ban
            cat > /etc/fail2ban/jail.local << 'F2B'
            [DEFAULT]
            bantime = 3600
            findtime = 600
            maxretry = 5
            [sshd]
            enabled = true
            port = 65002
            filter = sshd
            logpath = /var/log/secure
            maxretry = 3
            F2B
            systemctl enable fail2ban && systemctl restart fail2ban
            
            # Create deployuser
            id deployuser 2>/dev/null || useradd -m -s /bin/bash deployuser
            echo "deployuser:${{ secrets.VPS_PASSWORD }}" | chpasswd
            usermod -aG wheel deployuser 2>/dev/null || usermod -aG sudo deployuser
            echo "deployuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/deployuser
            chmod 440 /etc/sudoers.d/deployuser
            
            # SSH Hardening
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            grep -q "^AllowUsers" /etc/ssh/sshd_config && sed -i 's/^AllowUsers.*/AllowUsers deployuser/' /etc/ssh/sshd_config || echo "AllowUsers deployuser" >> /etc/ssh/sshd_config
            sshd -t && systemctl restart sshd
            
            echo "=== DEPLOYMENT COMPLETE ==="
            echo "URL: https://chat.dineshpandey.shop"
            echo "Direct: http://92.112.189.35"
            pm2 status
